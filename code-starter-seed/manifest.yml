# OSS AI Hub Code Library — v2 Manifest
#
# Each entry is a SEED that the generator (tools/generate_v2.py) turns into a
# full v2 record via Anthropic API. Add new entries here, run the
# "Code Starter v2 — Generate" workflow, then "Code Starter v2 — Push" syncs to
# Base44 by slug (upsert — existing slugs are updated, new ones inserted).
#
# Field guide:
#   slug          required, kebab-case, unique
#   title         required
#   category      one of the 20 enums in _schema.json
#   language      python | typescript | javascript | bash | dockerfile | yaml | rust | go
#   framework     primary framework, helps the generator know the stack
#   brief         1-2 sentences describing what this starter does — the LLM uses this to
#                 produce full v2 content (TL;DR, when-to-use, full code, variations,
#                 common errors, production checklist, etc.)
#   tags          suggested tags (generator may add more)
#   best_for_tags 3-6 specific use cases this is "best for"
#   featured      mark true to surface in homepage Featured row

library: code

defaults:
  license: MIT
  tested_with:
    last_verified_date: "2026-05-13"


name: PROBE discovery endpoint (temp)
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node probe-discovery.mjs
        env:
          DISCOVERY_SECRET:   ${{ secrets.DISCOVERY_SECRET }}
          DISCOVERY_ENDPOINT: ${{ secrets.DISCOVERY_ENDPOINT }}
          API_KEY:            ${{ secrets.TOOLS_UPSERT_API_KEY }}

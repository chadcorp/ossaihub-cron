name: Glossary v2 Nightly (rewrite new terms)

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rewrite ALL terms (force), not just new ones"
        required: false
        default: "false"
  schedule:
    # 08:34 UTC daily — after refresh-stars (06:17) and enrich-descriptions (07:43)
    - cron: "34 8 * * *"

jobs:
  rewrite-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest live glossary
        run: |
          mkdir -p glossary-seed/snapshots
          curl -sSf "https://base44.app/api/apps/69a91ff6770c8ca0347ae03d/functions/glossaryApi" \
            -o glossary-seed/snapshots/glossary_live.json
          python - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path("glossary-seed/snapshots/glossary_live.json").read_text(encoding="utf-8"))
          terms = data.get("terms") if isinstance(data, dict) else data
          print(f"Snapshot has {len(terms)} terms")
          # Report how many are already v2 on the server
          v2 = sum(1 for t in terms if t.get("rewrite_version") == "v2")
          print(f"Already v2 on server: {v2}/{len(terms)}")
          PY

      - name: Rewrite new / missing terms
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python glossary-seed/v2-scripts/rewrite_v2.py \
            --input glossary-seed/snapshots/glossary_live.json \
            --out glossary-seed/rebuilt-v2 \
            --workers 4 \
            --model claude-haiku-4-5-20251001 \
            $FORCE_FLAG

      - name: Merge into rebuilt-v2.json
        run: |
          python glossary-seed/v2-scripts/merge_v2.py \
            --in glossary-seed/rebuilt-v2 \
            --out glossary-seed/rebuilt-v2.json \
            --live glossary-seed/snapshots/glossary_live.json

      - name: Commit regenerated artifacts
        run: |
          git config user.name "glossary-bot"
          git config user.email "bot@ossaihub.com"
          git add glossary-seed/rebuilt-v2 glossary-seed/rebuilt-v2.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            STATS=$(python - <<'PY'
          import json, pathlib
          arr = json.loads(pathlib.Path("glossary-seed/rebuilt-v2.json").read_text(encoding="utf-8"))
          print(f"{len(arr)} terms")
          PY
          )
            git commit -m "glossary v2: nightly refresh — $STATS"
            git push
          fi

      - name: Push to Base44
        env:
          API_KEY: ${{ secrets.TOOLS_UPSERT_API_KEY }}
        run: |
          python glossary-seed/v2-scripts/push_v2.py \
            --file glossary-seed/rebuilt-v2.json

name: Enrich OSS AI Hub tool descriptions
on:
  schedule:
    - cron: '43 7 * * *'   # 07:43 UTC daily — after refresh-stars (06:17) but well before site traffic peaks
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log planned changes without writing to Base44'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      max_per_run:
        description: 'Cap tools enriched this run (default 80, set higher for one-shot backfills)'
        required: false
        default: '80'

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node enrich-descriptions.mjs
        env:
          GH_READONLY_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          BASE44_UPSERT_URL:  ${{ secrets.BASE44_UPSERT_URL }}
          BASE44_API_KEY:     ${{ secrets.TOOLS_UPSERT_API_KEY }}
          ENRICH_DRY_RUN:     ${{ inputs.dry_run }}
          ENRICH_MAX_PER_RUN: ${{ inputs.max_per_run }}

name: Glossary v2 Push

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: "false"
      only_slugs:
        description: "Comma-separated slug subset (empty = all)"
        required: false
        default: ""

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate payload
        run: |
          python - <<'PY'
          import json, pathlib, sys
          p = pathlib.Path("glossary-seed/rebuilt-v2.json")
          if not p.exists():
              print("ERROR: glossary-seed/rebuilt-v2.json missing. Merge locally or regen.", file=sys.stderr)
              sys.exit(1)
          arr = json.loads(p.read_text(encoding="utf-8"))
          required = {"slug","title","category","difficulty_tier","tldr","plain_english","how_it_works","why_it_matters","example","pitfalls","when_use","when_avoid","related_terms","faq","meta_title","meta_description"}
          bad = []
          for r in arr:
              miss = required - set(r.keys())
              if miss:
                  bad.append((r.get("slug","?"), list(miss)[:3]))
          if bad:
              print(f"VALIDATION FAIL: {len(bad)} records missing fields. First 5:", bad[:5], file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(arr)} v2 records, all fields present")
          PY

      - name: Push to Base44
        env:
          API_KEY: ${{ secrets.TOOLS_UPSERT_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python glossary-seed/v2-scripts/push_v2.py \
            --file glossary-seed/rebuilt-v2.json \
            --only "${{ github.event.inputs.only_slugs }}"

      - name: Smoke-test the deploy
        if: github.event.inputs.dry_run != 'true'
        run: |
          # Sleep so Base44 finishes propagating the writes, then spot-check
          sleep 30
          SAMPLES="rag ab-test-llm eval-harness"
          for slug in $SAMPLES; do
            body=$(curl -sSf "https://base44.app/api/apps/69a91ff6770c8ca0347ae03d/functions/glossaryApi" | python -c "
          import sys, json
          data=json.load(sys.stdin); terms=data.get('terms') if isinstance(data, dict) else data
          slug='$slug'
          rec=next((t for t in terms if t.get('slug')==slug), None)
          if not rec:
              print('MISSING'); sys.exit(1)
          print('tldr=', repr(rec.get('tldr'))[:80])
          print('faq_count=', len(rec.get('faq') or []))
          print('rewrite_version=', rec.get('rewrite_version'))
          ")
            echo "--- $slug ---"
            echo "$body"
          done

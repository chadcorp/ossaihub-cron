name: Glossary v2 Push

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes)"
        required: false
        default: "false"
      only_slugs:
        description: "Comma-separated slug subset (empty = all)"
        required: false
        default: ""

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate payload
        run: |
          python - <<'PY'
          import json, pathlib, sys
          p = pathlib.Path("glossary-seed/rebuilt-v2.json")
          if not p.exists():
              print("ERROR: glossary-seed/rebuilt-v2.json missing. Merge locally or regen.", file=sys.stderr)
              sys.exit(1)
          arr = json.loads(p.read_text(encoding="utf-8"))
          required = {"slug","title","category","difficulty_tier","tldr","plain_english","how_it_works","why_it_matters","example","pitfalls","when_use","when_avoid","related_terms","faq","meta_title","meta_description"}
          bad = []
          for r in arr:
              miss = required - set(r.keys())
              if miss:
                  bad.append((r.get("slug","?"), list(miss)[:3]))
          if bad:
              print(f"VALIDATION FAIL: {len(bad)} records missing fields. First 5:", bad[:5], file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(arr)} v2 records, all fields present")
          PY

      - name: Push to Base44
        env:
          API_KEY: ${{ secrets.TOOLS_UPSERT_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python glossary-seed/v2-scripts/push_v2.py \
            --file glossary-seed/rebuilt-v2.json \
            --only "${{ github.event.inputs.only_slugs }}"

      - name: Smoke-test the deploy
        if: github.event.inputs.dry_run != 'true'
        run: |
          # The internal /functions/glossaryApi endpoint was auth-gated by Base44
          # at some point in 2026; we now smoke-test against public surfaces only.
          # Two checks: sitemap contains every slug from rebuilt-v2.json, and a
          # sampled detail page returns 200 with substantive HTML.
          sleep 30
          python - <<'PY'
          import json, pathlib, random, sys, urllib.request, urllib.error

          UA = 'ossaihub-cron-glossary-smoke/2.0'
          SITEMAP = 'https://ossaihub.com/functions/generateSitemap'
          BASE_PAGE = 'https://ossaihub.com/glossary/'

          def fetch_text(url):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode('utf-8', errors='replace')

          arr = json.loads(pathlib.Path('glossary-seed/rebuilt-v2.json').read_text(encoding='utf-8'))
          want = {t['slug'] for t in arr if t.get('slug')}
          print(f"local rebuilt-v2 has {len(want)} slugs")

          sm = fetch_text(SITEMAP)
          have_in_sitemap = set()
          for line in sm.splitlines():
              if '<loc>' in line and '/glossary/' in line:
                  s = line.split('/glossary/')[-1].split('<')[0]
                  have_in_sitemap.add(s)
          print(f"sitemap exposes {len(have_in_sitemap)} glossary slugs")

          missing = want - have_in_sitemap
          if missing:
              print(f"MISSING from sitemap ({len(missing)}): {sorted(missing)[:10]}", file=sys.stderr)
              sys.exit(1)

          # Sample 5 random local slugs and confirm each detail page returns
          # 200 with substantive content (>10kB rendered HTML).
          sample = random.sample(sorted(want), 5)
          for slug in sample:
              try:
                  body = fetch_text(BASE_PAGE + slug)
              except urllib.error.HTTPError as e:
                  print(f"FAIL {slug}: HTTP {e.code}", file=sys.stderr); sys.exit(1)
              if len(body) < 10000:
                  print(f"FAIL {slug}: body only {len(body)}B", file=sys.stderr); sys.exit(1)
              print(f"OK {slug}: {len(body)//1000}kB")

          print(f"\nSMOKE OK — sitemap covers all {len(want)} slugs, sampled {len(sample)} detail pages all >10kB")
          PY

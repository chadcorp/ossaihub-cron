name: Prompt Library v2 — Generate

on:
  workflow_dispatch:
    inputs:
      only_slugs:
        description: "Comma-separated slugs (empty = all)"
        required: false
        default: ""
      skip_existing:
        description: "Skip slugs already in rebuilt-v2.json"
        required: false
        type: boolean
        default: true
      model:
        required: false
        default: "claude-sonnet-4-20250514"
      concurrency:
        required: false
        default: "8"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install anthropic pyyaml jsonschema

      - name: Generate v2 JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
        run: |
          python tools/generate_v2.py \
            --manifest prompt-library-seed/manifest.yml \
            --output prompt-library-seed/rebuilt-v2.json \
            --library prompt \
            --concurrency ${{ github.event.inputs.concurrency }} \
            --only "${{ github.event.inputs.only_slugs }}" \
            ${{ github.event.inputs.skip_existing == 'true' && '--skip-existing' || '' }}

      - name: Validate against schema
        run: |
          python - <<'PY'
          import json, pathlib, sys
          from jsonschema import validate, ValidationError
          schema = json.loads(pathlib.Path("prompt-library-seed/_schema.json").read_text())
          records = json.loads(pathlib.Path("prompt-library-seed/rebuilt-v2.json").read_text())
          fails = 0
          for r in records:
              try: validate(instance=r, schema=schema)
              except ValidationError as e:
                  print(f"INVALID {r.get('slug','?')}: {e.message[:200]}", file=sys.stderr); fails += 1
          print(f"{len(records)} records, {fails} schema failures")
          sys.exit(1 if fails else 0)
          PY

      - name: Commit rebuilt-v2.json
        run: |
          git config user.email "actions@github.com"
          git config user.name "ossaihub-cron"
          git add prompt-library-seed/rebuilt-v2.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "prompt-library: regenerate v2 [$(date +%F)]"
            git push
          fi
